# CLA Assistant — gates pull requests until the contributor signs the ICLA.
#
# How it works: on every PR, the bot comments asking unsigned contributors to
# reply with the sign-off sentence. Once they do, their signature is recorded in
# signatures/version1/cla.json (committed to this repo, so the signature data
# lives on infrastructure you control) and future PRs from them pass automatically.
#
# SETUP (one-time):
#   1. Replace <OWNER>/<REPO> below with your repo path.
#   2. Replace the allowlist with your own GitHub username (so your own PRs and
#      bots are not gated). Add Schedule A corporate signers here too.
#   3. Commit this file plus CLA/ICLA.md. That's it — no external service needed.
#
# NOTE: This bot automates the INDIVIDUAL flow (ICLA). The CORPORATE flow (CCLA)
# is handled manually: the employer signs CLA/CCLA.md out of band, then you add
# their developers' usernames to the allowlist below.

name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you'd rather store signatures in a SEPARATE private repo, create a
          # fine-grained PAT with contents:write on that repo and uncomment:
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/georgemac510/decent-portfolio/blob/main/CLA/ICLA.md"
          branch: "main"
          # Usernames exempt from signing (you + bots + corporate Schedule A signers):
          allowlist: georgemac510,dependabot[bot]

          # Optional: store signatures in a separate repo instead of this one.
          # remote-organization-name: <ORG>
          # remote-repository-name: cla-signatures

          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thanks for the PR. Before it can be merged, please read our [Contributor License Agreement](https://github.com/georgemac510/decent-portfolio/blob/main/CLA/ICLA.md) and sign it by posting the comment below. If you are contributing on behalf of an employer, your company must instead sign the [Corporate CLA](https://github.com/georgemac510/decent-portfolio/blob/main/CLA/CCLA.md)."
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✍️✅"
